name: lucky_calendar
description: "吉日カレンダー - 六曜・吉日・祝日表示付きカレンダーアプリ"
publish_to: 'none'
version: 1.0.3+5

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^14.8.1

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.0

  # URL launcher (Google Calendar連携)
  url_launcher: ^6.1.0

  # Ads
  google_mobile_ads: ^5.3.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/
